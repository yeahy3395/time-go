<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Executive Ally: Interactive PWA</title>
    
    <!-- PWA & Display Capabilities -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4F46E5">
    
    <!-- CDN Imports -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Kalam:wght@400;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Lamb Animations */
        .wander-active { 
            animation: wander-large 20s ease-in-out infinite; 
        }
        @keyframes wander-large {
            0%, 100% { transform: translate(0px, 0px) rotate(0deg); }
            20% { transform: translate(-40px, -10px) rotate(-5deg); }
            40% { transform: translate(20px, -30px) rotate(3deg); }
            60% { transform: translate(-60px, 10px) rotate(-2deg); }
            80% { transform: translate(30px, -5px) rotate(5deg); }
        }

        .exercise-active { 
            animation: exercise-routine 8s ease-in-out infinite; 
        }
        @keyframes exercise-routine {
            0%, 10%, 100% { transform: scale(1); }
            20% { transform: scaleY(1.15) scaleX(0.9) translateY(-10px); }
            40% { transform: translateY(-25px) rotate(10deg); }
            60% { transform: scaleX(1.1) scaleY(0.9); }
        }

        .lamb-click-reaction { 
            animation: click-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        @keyframes click-pop {
            0% { transform: scale(1); }
            30% { transform: scale(1.4) rotate(15deg); }
            100% { transform: scale(1); }
        }

        .zzz { 
            animation: zzz-fade 3s infinite; 
            opacity: 0; 
        }
        @keyframes zzz-fade {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            50% { opacity: 1; transform: translateY(-15px) scale(1); }
            100% { opacity: 0; transform: translateY(-30px) scale(1.2); }
        }

        .lamb-font { font-family: 'Kalam', cursive; }
    </style>
</head>
<body className="safe-top safe-bottom">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Dynamic API fallback definition
        const apiConfig = {
            apiKey: "", // Add your Gemini API key here
            appId: "pwa-executive-ally"
        };

        const LambCompanion = ({ isRunning }) => {
            const [message, setMessage] = useState("Tap me for a boost!");
            const [reactionClass, setReactionClass] = useState("");
            const [expression, setExpression] = useState("idle"); // idle, working, happy
            const [usedPhrases, setUsedPhrases] = useState([]);

            const phrases = [
                "You're doing amazing!",
                "Look at you go, focus master!",
                "Small steps lead to big wins!",
                "Your future self is thanking you!",
                "Deep breaths, you're doing fine!",
                "I'm so proud of your progress!",
                "Keep that momentum up!",
                "You're making it look easy!"
            ];

            const handleLambClick = () => {
                setReactionClass("lamb-click-reaction");
                setExpression("happy");
                
                setTimeout(() => {
                    setReactionClass("");
                    setExpression(isRunning ? "working" : "idle");
                }, 1500);

                let available = phrases.filter(p => !usedPhrases.includes(p));
                if (available.length === 0) {
                    available = phrases;
                    setUsedPhrases([]);
                }
                const nextPhrase = available[Math.floor(Math.random() * available.length)];
                setMessage(nextPhrase);
                setUsedPhrases(prev => [...prev, nextPhrase]);
            };

            useEffect(() => {
                if (!isRunning) {
                    setMessage("Zzz... Tap to wake me!");
                    setExpression("idle");
                } else {
                    setMessage("I'm watching! You got this!");
                    setExpression("working");
                }
            }, [isRunning]);

            return (
                <div className="fixed bottom-12 right-6 z-40 flex flex-col items-end">
                    {/* Speech Bubble */}
                    <div className="bg-white border-2 border-slate-800 p-3 rounded-2xl mb-2 shadow-xl max-w-[160px] relative pointer-events-none transition-all">
                        <p className="text-[11px] font-bold text-slate-700 leading-tight text-center lamb-font">{message}</p>
                        <div className="absolute -bottom-2 right-8 w-4 h-4 bg-white border-r-2 border-b-2 border-slate-800 transform rotate-45"></div>
                    </div>

                    {/* Lamb Figure */}
                    <div 
                        className={`relative w-28 h-28 cursor-pointer transition-all ${isRunning ? 'wander-active' : ''} ${reactionClass}`}
                        onClick={handleLambClick}
                    >
                        {expression === "idle" && (
                            <div className="absolute -top-4 left-4 flex gap-1 pointer-events-none">
                                <span className="zzz text-indigo-400 font-bold text-lg" style={{animationDelay: '0s'}}>Z</span>
                                <span className="zzz text-indigo-300 font-bold text-sm" style={{animationDelay: '1s'}}>z</span>
                                <span className="zzz text-indigo-200 font-bold text-xs" style={{animationDelay: '2s'}}>z</span>
                            </div>
                        )}
                        
                        <svg viewBox="0 0 100 100" className={`w-full h-full ${isRunning ? 'exercise-active' : ''}`}>
                            {/* Fluffy Comic Style Wavy Wool */}
                            <path 
                                d="M30 40 C20 30 25 15 40 15 C45 5 65 5 70 20 C85 15 95 30 85 45 C95 55 90 75 75 75 C75 85 55 90 45 80 C30 85 15 75 20 60 C10 50 15 40 30 40" 
                                fill="white" 
                                stroke="#334155" 
                                strokeWidth="3.5" 
                                strokeLinejoin="round"
                            />
                            
                            {/* Head & Face */}
                            <ellipse cx="52" cy="52" rx="22" ry="18" fill="white" stroke="#334155" strokeWidth="2.5" />
                            
                            {/* Rosy Blush */}
                            <circle cx="38" cy="58" r="6" fill="#fecaca" opacity="0.8" />
                            <circle cx="66" cy="58" r="6" fill="#fecaca" opacity="0.8" />
                            
                            {/* Dynamic Eye Expression Controller */}
                            <g>
                                {expression === "happy" ? (
                                    <>
                                        {/* Big, Friendly Round Awakening Eyes with Warm White Highlights */}
                                        <circle cx="43" cy="50" r="5.5" fill="#334155" />
                                        <circle cx="45" cy="48" r="1.5" fill="white" />
                                        
                                        <circle cx="61" cy="50" r="5.5" fill="#334155" />
                                        <circle cx="63" cy="48" r="1.5" fill="white" />

                                        {/* Happy Smile */}
                                        <path d="M46 61 Q52 68 58 61" fill="none" stroke="#334155" strokeWidth="3" strokeLinecap="round" />
                                    </>
                                ) : expression === "working" ? (
                                    <>
                                        {/* Focused round eyes */}
                                        <circle cx="44" cy="51" r="3" fill="#334155" />
                                        <circle cx="60" cy="51" r="3" fill="#334155" />
                                        <path d="M49 60 Q52 62 55 60" fill="none" stroke="#334155" strokeWidth="2" strokeLinecap="round" />
                                    </>
                                ) : (
                                    <>
                                        {/* Soft cozy sleeping eyes */}
                                        <path d="M40 52 Q44 49 48 52" fill="none" stroke="#334155" strokeWidth="2.5" strokeLinecap="round" />
                                        <path d="M56 52 Q60 49 64 52" fill="none" stroke="#334155" strokeWidth="2.5" strokeLinecap="round" />
                                        <path d="M50 60 L54 60" fill="none" stroke="#334155" strokeWidth="1.5" strokeLinecap="round" />
                                    </>
                                )}
                            </g>
                            
                            {/* Hooves */}
                            <rect x="28" y="72" width="10" height="8" rx="3" fill="#78350f" stroke="#334155" strokeWidth="2" />
                            <rect x="66" y="72" width="10" height="8" rx="3" fill="#78350f" stroke="#334155" strokeWidth="2" />
                            <rect x="40" y="80" width="8" height="6" rx="2" fill="#78350f" stroke="#334155" strokeWidth="2" />
                            <rect x="58" y="80" width="8" height="6" rx="2" fill="#78350f" stroke="#334155" strokeWidth="2" />

                            {/* Floppy Comic Ears */}
                            <ellipse cx="28" cy="35" rx="8" ry="5" fill="white" stroke="#334155" strokeWidth="3" transform="rotate(-35 28 35)" />
                            <ellipse cx="76" cy="35" rx="8" ry="5" fill="white" stroke="#334155" strokeWidth="3" transform="rotate(35 76 35)" />
                        </svg>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('exec-ally-pwa-tasks');
                return saved ? JSON.parse(saved) : [];
            });
            const [inputValue, setInputValue] = useState("");
            const [category, setCategory] = useState("Work");
            const [priority, setPriority] = useState("Medium");
            const [filter, setFilter] = useState("All");

            const categories = ["Work", "Personal", "Health", "Errands"];
            const priorities = ["Low", "Medium", "High"];

            const encouragements = [
                "One down, you're on fire! 🔥",
                "Look at that momentum! 🚀",
                "Micro-win secured! 🏆",
                "Dopamine hit! Nice work. 🧠",
                "Keep that flow going! 🌊"
            ];

            // Local persistence
            useEffect(() => {
                localStorage.setItem('exec-ally-pwa-tasks', JSON.stringify(tasks));
            }, [tasks]);

            // Timer management hook
            useEffect(() => {
                const timerInterval = setInterval(() => {
                    setTasks(prevTasks => {
                        return prevTasks.map(t => {
                            if (t.isRunning && !t.completed) {
                                return { ...t, timeSpent: (t.timeSpent || 0) + 1 };
                            }
                            return t;
                        });
                    });
                }, 1000);

                return () => clearInterval(timerInterval);
            }, []);

            const addTask = (e) => {
                e.preventDefault();
                if (!inputValue.trim()) return;
                
                const newTask = {
                    id: crypto.randomUUID(),
                    text: inputValue,
                    category,
                    priority,
                    completed: false,
                    expanded: false,
                    isGenerating: false,
                    isSOP: false,
                    isRunning: false,
                    timeSpent: 0,
                    lastEncouragement: "",
                    subtasks: [],
                    createdAt: Date.now()
                };
                
                setTasks([newTask, ...tasks]);
                setInputValue("");
            };

            const toggleTask = (taskId, currentStatus) => {
                const isNowCompleted = !currentStatus;
                setTasks(tasks.map(t => t.id === taskId ? {
                    ...t,
                    completed: isNowCompleted,
                    isRunning: false,
                    lastEncouragement: isNowCompleted ? "Project Complete! You're a legend! 🎖️" : ""
                } : t));
            };

            const toggleTimer = (taskId) => {
                setTasks(tasks.map(t => {
                    if (t.id === taskId) {
                        return { ...t, isRunning: !t.isRunning };
                    }
                    // Pause other timers
                    return { ...t, isRunning: false };
                }));
            };

            const toggleSubtask = (taskId, subtaskId) => {
                setTasks(tasks.map(t => {
                    if (t.id === taskId) {
                        const updatedSubtasks = t.subtasks.map(st => 
                            st.id === subtaskId ? { ...st, completed: !st.completed } : st
                        );
                        const justFinished = updatedSubtasks.find(st => st.id === subtaskId)?.completed;
                        const randomEncouragement = justFinished 
                            ? encouragements[Math.floor(Math.random() * encouragements.length)] 
                            : "";
                        return {
                            ...t,
                            subtasks: updatedSubtasks,
                            lastEncouragement: randomEncouragement
                        };
                    }
                    return t;
                }));
            };

            const deleteTask = (taskId) => {
                setTasks(tasks.filter(t => t.id !== taskId));
            };

            const toggleExpand = (taskId) => {
                setTasks(tasks.map(t => t.id === taskId ? { ...t, expanded: !t.expanded } : t));
            };

            const generateSubtasks = async (taskId, taskText, mode = "steps") => {
                setTasks(tasks.map(t => t.id === taskId ? { ...t, isGenerating: true, expanded: true } : t));

                const systemPrompt = mode === "sop" 
                  ? "You are an ADHD coach. Create standard operating steps for this routine. Break it into 3-5 trivial micro-steps. Respond ONLY with a JSON array of strings."
                  : "You are a productivity expert. Break this into exactly 3-5 small, friendly steps. Respond ONLY with a JSON array of strings.";
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiConfig.apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Task: "${taskText}". Create micro-steps.` }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { 
                                responseMimeType: "application/json",
                                responseSchema: { type: "ARRAY", items: { type: "STRING" } }
                            }
                        })
                    });

                    const data = await response.json();
                    const steps = JSON.parse(data.candidates[0].content.parts[0].text);
                    const newSteps = steps.map((step, index) => ({
                        id: Date.now() + index,
                        text: step,
                        completed: false
                    }));

                    setTasks(tasks.map(t => t.id === taskId ? {
                        ...t,
                        subtasks: mode === "sop" ? newSteps : [...t.subtasks, ...newSteps],
                        isGenerating: false,
                        isSOP: mode === "sop"
                    } : t));
                } catch (error) {
                    console.error("AI Error:", error);
                    // Local fallback generator if offline/no key
                    const fallbackSteps = ["Prepare your setup", "Focus for 10 minutes", "Check in & breathe"];
                    const newSteps = fallbackSteps.map((step, index) => ({
                        id: Date.now() + index,
                        text: step,
                        completed: false
                    }));
                    setTasks(tasks.map(t => t.id === taskId ? {
                        ...t,
                        subtasks: newSteps,
                        isGenerating: false,
                        isSOP: mode === "sop"
                    } : t));
                }
            };

            const calculateProgress = (subtasks) => {
                if (!subtasks || subtasks.length === 0) return 0;
                const completed = subtasks.filter(s => s.completed).length;
                return Math.round((completed / subtasks.length) * 100);
            };

            const activeTask = useMemo(() => tasks.find(t => t.isRunning), [tasks]);

            return (
                <div className="min-h-screen bg-[#F8FAFC] p-4 md:p-8 font-sans text-slate-900">
                    <div className="max-w-2xl mx-auto">
                        <header className="mb-10 text-center">
                            <div className="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl mb-4 shadow-lg shadow-indigo-200">
                                <i data-lucide="zap" className="text-white w-8 h-8"></i>
                            </div>
                            <h1 className="text-3xl font-bold text-slate-900 tracking-tight">Executive Function Ally</h1>
                            <div className="flex items-center justify-center gap-2 mt-2">
                                <div className="flex items-center gap-1.5 text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full">
                                    <i data-lucide="cloud" className="w-3.5 h-3.5"></i>
                                    <span className="text-[10px] font-black uppercase tracking-widest">Local & PWA Storage Active</span>
                                </div>
                            </div>
                        </header>

                        {/* Input Container */}
                        <div className="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 p-6 mb-10">
                            <form onSubmit={addTask} className="space-y-4">
                                <input
                                    type="text"
                                    placeholder="Brain dump your goal here..."
                                    className="w-full text-xl px-2 py-2 border-b-2 border-slate-100 focus:border-indigo-500 focus:outline-none transition-all placeholder:text-slate-300 font-medium"
                                    value={inputValue}
                                    onChange={(e) => setInputValue(e.target.value)}
                                />
                                
                                <div className="flex flex-wrap gap-4 items-center justify-between pt-2">
                                    <div className="flex gap-3">
                                        <select 
                                            value={category} 
                                            onChange={(e) => setCategory(e.target.value)}
                                            className="bg-slate-50 text-xs font-bold uppercase tracking-widest text-slate-500 px-3 py-2 rounded-lg border-none outline-none"
                                        >
                                            {categories.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                        
                                        <select 
                                            value={priority} 
                                            onChange={(e) => setPriority(e.target.value)}
                                            className="bg-slate-50 text-xs font-bold uppercase tracking-widest text-slate-500 px-3 py-2 rounded-lg border-none outline-none"
                                        >
                                            {priorities.map(p => <option key={p} value={p}>{p}</option>)}
                                        </select>
                                    </div>
                                    
                                    <button 
                                        type="submit"
                                        className="bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold hover:bg-slate-800 transition-all active:scale-95 shadow-lg"
                                    >
                                        Add to List
                                    </button>
                                </div>
                            </form>
                        </div>

                        {/* Filtering Categories */}
                        <div className="flex gap-3 mb-8 overflow-x-auto no-scrollbar pb-2">
                            {["All", ...categories].map(c => (
                                <button 
                                    key={c}
                                    onClick={() => setFilter(c)}
                                    className={`px-5 py-2 rounded-xl text-sm font-bold transition-all whitespace-nowrap ${filter === c ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-slate-500 border border-slate-100'}`}
                                >
                                    {c}
                                </button>
                            ))}
                        </div>

                        {/* List rendering */}
                        <div className="space-y-6">
                            {tasks.filter(t => filter === "All" || t.category === filter).map(task => {
                                const progress = calculateProgress(task.subtasks);
                                const isFullyDone = task.completed || (task.subtasks?.length > 0 && progress === 100);

                                return (
                                    <div 
                                        key={task.id} 
                                        className={`group bg-white rounded-3xl border border-slate-100 transition-all relative ${isFullyDone ? 'opacity-70 shadow-none' : 'shadow-sm hover:shadow-xl hover:shadow-slate-200/40'} ${task.isRunning ? 'ring-4 ring-indigo-50 border-indigo-400' : ''}`}
                                    >
                                        {task.lastEncouragement && (
                                            <div className="absolute -top-4 right-6 bg-emerald-500 text-white text-[11px] font-black py-1.5 px-3 rounded-full shadow-lg z-10 animate-bounce">
                                                {task.lastEncouragement}
                                            </div>
                                        )}

                                        {task.subtasks?.length > 0 && (
                                            <div className="w-full h-1 bg-slate-50 rounded-t-3xl overflow-hidden">
                                                <div 
                                                    className={`h-full transition-all duration-700 ${progress === 100 ? 'bg-emerald-500' : 'bg-indigo-400'}`} 
                                                    style={{ width: `${progress}%` }}
                                                />
                                            </div>
                                        )}

                                        <div className="p-6">
                                            <div className="flex items-start gap-4">
                                                <button 
                                                    onClick={() => toggleTask(task.id, task.completed)}
                                                    className={`mt-1 transition-all transform active:scale-125 ${isFullyDone ? 'text-emerald-500' : 'text-slate-200 hover:text-indigo-400'}`}
                                                >
                                                    {isFullyDone ? (
                                                        <span className="text-xl">🏆</span>
                                                    ) : (
                                                        <i data-lucide="circle" className="w-7 h-7 stroke-slate-300"></i>
                                                    )}
                                                </button>
                                                
                                                <div className="flex-1 min-w-0" onClick={() => toggleExpand(task.id)}>
                                                    <h3 className={`text-lg font-bold text-slate-800 leading-tight cursor-pointer ${isFullyDone ? 'line-through text-slate-400' : ''}`}>
                                                        {task.text}
                                                    </h3>
                                                    <div className="flex gap-3 mt-2 text-[10px] font-black uppercase tracking-widest items-center">
                                                        <span className="text-slate-400 border border-slate-100 px-2 py-0.5 rounded-md">{task.category}</span>
                                                        <span className={task.priority === 'High' ? 'text-rose-500' : 'text-indigo-400'}>{task.priority} PRIORITY</span>
                                                        {task.timeSpent > 0 && (
                                                            <span className="flex items-center gap-1 text-slate-500 font-mono">
                                                                ⏱️ {Math.floor(task.timeSpent / 60)}m {task.timeSpent % 60}s
                                                            </span>
                                                        )}
                                                    </div>
                                                </div>

                                                <div className="flex gap-1 items-center">
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); toggleTimer(task.id); }}
                                                        disabled={task.completed}
                                                        className={`p-2 rounded-xl transition-all ${task.isRunning ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-100'}`}
                                                    >
                                                        <i data-lucide={task.isRunning ? "pause" : "play"} className="w-4 h-4"></i>
                                                    </button>
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); generateSubtasks(task.id, task.text, "steps"); }}
                                                        className="p-2 text-indigo-500 hover:bg-indigo-50 rounded-xl"
                                                    >
                                                        <i data-lucide="sparkles" className="w-5 h-5"></i>
                                                    </button>
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); generateSubtasks(task.id, task.text, "sop"); }}
                                                        className="p-2 text-emerald-500 hover:bg-emerald-50 rounded-xl"
                                                    >
                                                        <i data-lucide="book-open" className="w-5 h-5"></i>
                                                    </button>
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); deleteTask(task.id); }}
                                                        className="p-2 text-slate-300 hover:text-rose-500 rounded-xl"
                                                    >
                                                        <i data-lucide="trash-2" className="w-5 h-5"></i>
                                                    </button>
                                                </div>
                                            </div>

                                            {task.expanded && (
                                                <div className="mt-6 pl-11 space-y-3">
                                                    {task.isGenerating ? (
                                                        <div className="flex items-center gap-3 text-indigo-400 font-bold text-sm animate-pulse">
                                                            <i data-lucide="loader-2" className="w-4 h-4 animate-spin"></i>
                                                            Building roadmap...
                                                        </div>
                                                    ) : (
                                                        <>
                                                            {task.isSOP && <p className="text-[10px] font-black text-emerald-600 uppercase tracking-tighter mb-2">SOP Active</p>}
                                                            {task.subtasks?.map(subtask => (
                                                                <div key={subtask.id} className="flex items-center gap-3 group/item cursor-pointer" onClick={() => toggleSubtask(task.id, subtask.id)}>
                                                                    <div className={`transition-all ${subtask.completed ? 'text-emerald-500 scale-110' : 'text-slate-200'}`}>
                                                                        <i data-lucide={subtask.completed ? "check-circle-2" : "circle"} className="w-5 h-5"></i>
                                                                    </div>
                                                                    <span className={`text-sm font-medium ${subtask.completed ? 'line-through text-slate-300' : 'text-slate-600'}`}>
                                                                        {subtask.text}
                                                                    </span>
                                                                </div>
                                                            ))}
                                                        </>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Floating Lamby Companion */}
                    <LambCompanion isRunning={!!activeTask} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        const loadIcons = () => { if (window.lucide) window.lucide.createIcons(); };
        window.addEventListener('load', loadIcons);
        document.addEventListener('click', () => setTimeout(loadIcons, 50));
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then((registration) => {
                        console.log('PWA Service Worker registered successfully with scope:', registration.scope);
                    })
                    .catch((error) => {
                        console.error('PWA Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
